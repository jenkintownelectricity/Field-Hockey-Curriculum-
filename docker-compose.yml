services:
  postgres:
    image: postgres:16-alpine
    container_name: fieldhockeykernel-postgres
    environment:
      POSTGRES_USER: fieldhockey
      POSTGRES_PASSWORD: fieldhockey
      POSTGRES_DB: fieldhockey
    ports:
      - "5432:5432"
    volumes:
      - fieldhockey_pg:/var/lib/postgresql/data
volumes:
  fieldhockey_pg: